<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Key - Piano - MIDI Keyboard Player</title>
    <meta
      name="description"
      content="By Sadrita Neogi ( Hack Club )" />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        /* Matches the background color of your App.tsx */
        background-color: #F3E8FF; 
      }

      .hc-flag-container {
        position: absolute;
        top: 0;
        left: 10px;
        z-index: 999;
        transition: transform 0.1s steps(2); /* Retro "stutter" animation */
      }

      .hc-flag-container img {
        width: 256px;
        border: 0;
        display: block;
      }

      /* Hover effect that feels more mechanical/retro */
      .hc-flag-container:hover {
        transform: translateY(2px);
      }
    </style>
  </head>
  <body>
    <a href="https://hackclub.com/" class="hc-flag-container">
      <img 
        src="https://assets.hackclub.com/flag-orpheus-left.svg" 
        alt="Hack Club" 
      />
    </a>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
